<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive 3D Solar System</title>
    <style
        :root {
            --bg: #020205;
            --text: #ffffff;
            --panel-bg: rgba(10, 15, 30, 0.85);
            --border: #3a5a80;
            --highlight: #4da8da;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        #instruction {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 16px;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #info-panel {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: var(--panel-bg);
            padding: 30px;
            border: 2px solid var(--border);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(77, 168, 218, 0.2);
            text-align: center;
            pointer-events: auto;
            backdrop-filter: blur(8px);
            max-width: 90%;
            width: 350px;
            display: none; /* Hidden initially */
            transform: translateY(20px);
            animation: slideUp 0.4s ease forwards;
        }

        @media (max-width: 600px) {
            #info-panel {
                left: 10px;
                right: 10px;
                bottom: 10px;
                width: auto;
            }
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
            from { transform: translateY(20px); opacity: 0; }
        }

        h1 {
            color: var(--highlight);
            margin-top: 0;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        p {
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .stats {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            color: #ccc;
            text-align: left;
        }

        button {
            background: transparent;
            color: var(--highlight);
            font-size: 16px;
            font-weight: bold;
            padding: 12px 30px;
            border: 2px solid var(--highlight);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            outline: none;
        }

        button:hover {
            background: var(--highlight);
            color: var(--bg);
            box-shadow: 0 0 15px var(--highlight);
        }

    </style>
    <!-- Include Three.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Include OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="instruction">Tap or click a planet to explore</div>

        <div id="info-panel">
            <h1 id="planet-name">Planet Name</h1>
            <div class="stats" id="planet-stats">
                Type: ...<br>
                Moons: ...
            </div>
            <p id="planet-desc">Description goes here.</p>
            <button id="back-btn">Back to Orbit</button>
        </div>
    </div>

    <script>
        // --- SCENE VARIABLES ---
        let scene, camera, renderer, controls;
        let starParticles;
        const planets = [];
        let selectedPlanet = null;
        let isTransitioning = false;

        // Camera smoothing variables
        const currentLookAt = new THREE.Vector3(0, 0, 0);
        let defaultCameraPos = new THREE.Vector3(0, 45, 65);
        
        // Raycaster for clicking
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const pointerDownPos = new THREE.Vector2();

        // DOM Elements
        const infoPanel = document.getElementById('info-panel');
        const instructionLabel = document.getElementById('instruction');
        const nameEl = document.getElementById('planet-name');
        const descEl = document.getElementById('planet-desc');
        const statsEl = document.getElementById('planet-stats');
        const backBtn = document.getElementById('back-btn');

        // --- PLANETARY DATA ---
        // Distances and sizes are heavily adjusted for visual gameplay/viewing, not realistic scale
        const solarSystemData = [
            { 
                name: "Sun", color: 0xffdd00, size: 6, distance: 0, speed: 0.002,
                type: "Yellow Dwarf Star", moons: 0,
                desc: "The star at the center of our solar system. Its gravity holds everything together, and it provides the light and heat necessary for life on Earth." 
            },
            { 
                name: "Mercury", color: 0x888888, size: 0.8, distance: 12, speed: 0.04,
                type: "Terrestrial Planet", moons: 0,
                desc: "The smallest planet in our solar system and the closest to the Sun. It has a rocky surface covered in craters, much like our Moon." 
            },
            { 
                name: "Venus", color: 0xe3bb76, size: 1.5, distance: 18, speed: 0.015,
                type: "Terrestrial Planet", moons: 0,
                desc: "The second planet from the Sun. It has a thick, toxic atmosphere that traps heat, making it the hottest planet in the solar system." 
            },
            { 
                name: "Earth", color: 0x2b82c9, size: 1.6, distance: 25, speed: 0.01,
                type: "Terrestrial Planet", moons: 1,
                desc: "Our home planet! It is the only place we know of so far that is inhabited by living things, thanks to its liquid water oceans." 
            },
            { 
                name: "Mars", color: 0xc1440e, size: 1.2, distance: 32, speed: 0.008,
                type: "Terrestrial Planet", moons: 2,
                desc: "Known as the Red Planet due to iron oxide (rust) on its surface. It has giant volcanoes and a very thin atmosphere." 
            },
            { 
                name: "Jupiter", color: 0xd39c7e, size: 3.5, distance: 45, speed: 0.005,
                type: "Gas Giant", moons: 95,
                desc: "The largest planet in our solar system. It is a giant ball of gas, famous for its Great Red Spot, which is a massive storm." 
            },
            { 
                name: "Saturn", color: 0xead6b8, size: 3.0, distance: 58, speed: 0.003,
                type: "Gas Giant", moons: 146,
                desc: "Famous for its spectacular, complex ring system made mostly of ice chunks and rock. It is the second-largest planet." 
            },
            { 
                name: "Uranus", color: 0x4b70dd, size: 2.2, distance: 70, speed: 0.002,
                type: "Ice Giant", moons: 28,
                desc: "An ice giant that rotates on its side! It has a pale blue color due to the methane gas in its atmosphere." 
            },
            { 
                name: "Neptune", color: 0x274687, size: 2.1, distance: 82, speed: 0.001,
                type: "Ice Giant", moons: 16,
                desc: "The farthest known planet from the Sun. It is dark, cold, and whipped by supersonic winds. It shares a similar makeup to Uranus." 
            }
        ];

        // --- INITIALIZATION ---
        function init() {
            const container = document.getElementById('game-container');

            // 1. Scene setup
            scene = new THREE.Scene();

            // 2. Camera setup
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(defaultCameraPos);

            // 3. Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // 4. Lighting
            // Ambient light so the dark side of planets isn't completely pitch black
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
            scene.add(ambientLight);

            // Sunlight originating from the center (where the Sun is)
            const sunLight = new THREE.PointLight(0xffffff, 1.5, 300);
            sunLight.position.set(0, 0, 0);
            scene.add(sunLight);

            // Orbit Controls setup
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Adds smooth weight to dragging
            controls.dampingFactor = 0.05;
            controls.maxDistance = 200;
            controls.minDistance = 2;

            // 5. Create Objects
            createStarfield();
            createSolarSystem();

            // 6. Event Listeners
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('pointerup', onPointerUp);
            backBtn.addEventListener('click', resetView);
            
            // Start Loop
            animate();
        }

        // --- OBJECT CREATION ---
        function createSolarSystem() {
            solarSystemData.forEach(data => {
                // Sphere for the planet
                const geometry = new THREE.SphereGeometry(data.size, 32, 32);
                let material;
                
                // The sun glows and isn't affected by shadows the same way
                if (data.name === "Sun") {
                    material = new THREE.MeshBasicMaterial({ color: data.color });
                } else {
                    // Planets react to the point light
                    material = new THREE.MeshStandardMaterial({ 
                        color: data.color, 
                        roughness: 0.6,
                        metalness: 0.1
                    });
                }

                const mesh = new THREE.Mesh(geometry, material);
                
                // Attach data for raycaster logic
                mesh.userData = data; 
                mesh.name = data.name;

                // Create a pivot object at the center (0,0,0). 
                // We rotate the pivot to make the planet orbit!
                const pivot = new THREE.Group();
                scene.add(pivot);

                // Move the planet out to its distance
                mesh.position.x = data.distance;
                pivot.add(mesh);

                // Add Rings to Saturn
                if (data.name === "Saturn") {
                    const ringGeo = new THREE.RingGeometry(data.size * 1.4, data.size * 2.2, 64);
                    const ringMat = new THREE.MeshBasicMaterial({ 
                        color: 0xddc0a0, 
                        side: THREE.DoubleSide, 
                        transparent: true, 
                        opacity: 0.8 
                    });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    // Tilt the ring
                    ring.rotation.x = Math.PI / 2 + 0.4;
                    mesh.add(ring);
                }

                // Create orbital path line for visuals
                if (data.distance > 0) {
                    const pathGeo = new THREE.RingGeometry(data.distance - 0.05, data.distance + 0.05, 128);
                    const pathMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.1 });
                    const pathLine = new THREE.Mesh(pathGeo, pathMat);
                    pathLine.rotation.x = Math.PI / 2;
                    scene.add(pathLine);
                }

                planets.push({ mesh, pivot, data });
            });
        }

        function createStarfield() {
            const particleCount = 3000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                // Generate stars in a large sphere around the solar system
                const r = 150 + Math.random() * 200;
                const theta = 2 * Math.PI * Math.random();
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);     // x
                positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta); // y
                positions[i * 3 + 2] = r * Math.cos(phi);                   // z
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.5,
                transparent: true,
                opacity: 0.6
            });

            starParticles = new THREE.Points(geometry, material);
            scene.add(starParticles);
        }

        // --- INTERACTION ---
        function onPointerDown(event) {
            // Ignore clicks if they are on the UI panel
            if (event.target.tagName === 'BUTTON' || event.target.closest('#info-panel')) return;
            
            // Record where the pointer started to detect drag vs click
            pointerDownPos.set(event.clientX, event.clientY);
        }

        function onPointerUp(event) {
            // Ignore clicks if they are on the UI panel
            if (event.target.tagName === 'BUTTON' || event.target.closest('#info-panel')) return;

            // Check if user was dragging the camera (distance > 5 pixels)
            const dist = Math.hypot(event.clientX - pointerDownPos.x, event.clientY - pointerDownPos.y);
            if (dist > 5) return;

            // Convert mouse position to normalized device coordinates (-1 to +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // Update the picking ray with the camera and mouse position
            raycaster.setFromCamera(mouse, camera);

            // Calculate objects intersecting the picking ray
            const meshes = planets.map(p => p.mesh);
            // Check for children (like Saturn's rings) so clicking the ring also works
            const intersects = raycaster.intersectObjects(meshes, true);

            if (intersects.length > 0) {
                // Find the parent planet if a ring was clicked
                let clickedObject = intersects[0].object;
                if (clickedObject.geometry.type === "RingGeometry" && clickedObject.parent) {
                    clickedObject = clickedObject.parent;
                }

                // Find our data wrapper
                const planetObj = planets.find(p => p.mesh === clickedObject);
                if (planetObj) {
                    focusOnPlanet(planetObj);
                }
            }
        }

        function focusOnPlanet(planetObj) {
            selectedPlanet = planetObj;
            isTransitioning = true;
            
            // Update UI
            nameEl.innerText = planetObj.data.name;
            descEl.innerText = planetObj.data.desc;
            statsEl.innerHTML = `
                <strong>Type:</strong> ${planetObj.data.type}<br>
                <strong>Moons:</strong> ${planetObj.data.moons}
            `;
            
            instructionLabel.style.opacity = '0';
            infoPanel.style.display = 'block';
        }

        function resetView() {
            selectedPlanet = null;
            isTransitioning = true;
            infoPanel.style.display = 'none';
            instructionLabel.style.opacity = '1';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            // 1. Orbit and Rotate Planets
            planets.forEach(p => {
                // If a planet is selected, slow down the entire system drastically so it's easier to look at
                const speedModifier = selectedPlanet ? 0.05 : 1.0;
                
                // Orbit around the sun
                p.pivot.rotation.y += p.data.speed * speedModifier;
                
                // Spin on its own axis (Sun spins slowly, planets spin faster)
                p.mesh.rotation.y += (p.data.name === "Sun" ? 0.002 : 0.02) * speedModifier;
            });

            // Slowly rotate the background starfield
            if (starParticles) {
                starParticles.rotation.y -= 0.0005;
            }

            // 2. Camera Logic & Orbit Controls
            if (selectedPlanet) {
                const currentPlanetPos = new THREE.Vector3();
                selectedPlanet.mesh.getWorldPosition(currentPlanetPos);
                
                if (isTransitioning) {
                    // Disable manual controls while smoothly flying to the planet
                    controls.enabled = false;
                    controls.target.lerp(currentPlanetPos, 0.05);
                    
                    const zoomDistance = selectedPlanet.data.size * 3.5 + 2; 
                    const idealPos = currentPlanetPos.clone().add(new THREE.Vector3(zoomDistance, selectedPlanet.data.size, zoomDistance));
                    camera.position.lerp(idealPos, 0.05);
                    
                    if (controls.target.distanceTo(currentPlanetPos) < 0.1 && camera.position.distanceTo(idealPos) < 0.5) {
                        isTransitioning = false;
                        controls.enabled = true; // Let user explore again
                    }
                    camera.lookAt(controls.target);
                } else {
                    // Update target to moving planet, OrbitControls shifts camera automatically
                    controls.target.copy(currentPlanetPos);
                    controls.update();
                }
            } else {
                // Overview Mode
                const origin = new THREE.Vector3(0, 0, 0);
                if (isTransitioning) {
                    controls.enabled = false;
                    controls.target.lerp(origin, 0.05);
                    camera.position.lerp(defaultCameraPos, 0.05);
                    
                    if (controls.target.distanceTo(origin) < 0.1 && camera.position.distanceTo(defaultCameraPos) < 0.5) {
                        isTransitioning = false;
                        controls.enabled = true;
                    }
                    camera.lookAt(controls.target);
                } else {
                    controls.target.copy(origin);
                    controls.update();
                }
            }

            renderer.render(scene, camera);
        }

        // --- BOOTSTRAP ---
        window.onload = init;

    </script>
</body>
</html>
